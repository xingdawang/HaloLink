name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'
      - '.github/apk-build-trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        working-directory: android-app
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp android-app/app/build/outputs/apk/debug/app-debug.apk dist/HaloLink-v0.1.3-debug.apk
          shasum -a 256 dist/HaloLink-v0.1.3-debug.apk > dist/HaloLink-v0.1.3-debug.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaloLink-Android-debug
          path: dist/*
          if-no-files-found: error
          retention-days: 30
