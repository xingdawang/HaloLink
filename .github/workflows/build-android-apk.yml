name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'
      - '.github/apk-build-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Test, lint, and build debug APK
        working-directory: android-app
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace testDebugUnitTest lintDebug assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp android-app/app/build/outputs/apk/debug/app-debug.apk dist/HaloLink-v0.1.6-debug.apk
          (cd dist && shasum -a 256 HaloLink-v0.1.6-debug.apk > HaloLink-v0.1.6-debug.apk.sha256)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaloLink-Android-debug
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Commit APK to repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p apk
          cp dist/HaloLink-v0.1.6-debug.apk apk/HaloLink-v0.1.6-debug.apk
          cp dist/HaloLink-v0.1.6-debug.apk.sha256 apk/HaloLink-v0.1.6-debug.apk.sha256
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f apk/HaloLink-v0.1.6-debug.apk apk/HaloLink-v0.1.6-debug.apk.sha256
          if git diff --cached --quiet; then
            echo "APK is already up to date."
          else
            git commit -m "Add HaloLink Android v0.1.6 APK [skip ci]"
            git push origin HEAD:main
          fi
