<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="popup.css"></head>
<body>
  <header><div class="halo"></div><div><strong>HaloLink</strong><small>ChatGPT status bridge</small></div></header>
  <section><span id="dot" class="dot"></span><span id="connection">Checking Bridge…</span></section>
  <section class="state">
    <small>Latest state</small><strong id="state">—</strong><span id="time"></span>
    <small id="reason" class="reason">—</small><code id="evidence" class="evidence">—</code>
  </section>
  <section class="details">
    <div><small>PID</small><code id="bridgePid">—</code></div>
    <div><small>Port</small><code id="bridgePort">—</code></div>
    <div><small>Version</small><code id="bridgeVersion">—</code></div>
    <div><small>Phones</small><code id="phoneClients">—</code></div>
  </section>
  <div class="tests">
    <button data-state="THINKING">Thinking</button><button data-state="WORKING">Working</button>
    <button data-state="COMPLETED">Completed</button><button data-state="ERROR">Error</button>
  </div>
  <p>Bridge: <code id="bridgeAddress">searching 8766–8775</code></p>
  <script src="popup.js"></script>
</body></html>
